<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Viewer</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

.reels-container {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.reel {
    height: 100vh;
    position: relative;
    scroll-snap-align: start;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>

</head>
<body>

<div class="reels-container" id="reels"></div>

<script>
// "Videos stored in JS"
const videos = [
    "vedios/engonga.mp4",
    "vedios/Booty.mp4",
    "vedios/cherokee.mp4"
];

const container = document.getElementById("reels");

// Create reels dynamically
videos.forEach(src => {
    const reel = document.createElement("div");
    reel.className = "reel";

    const video = document.createElement("video");
    video.src = src;
    video.loop = true;
    video.muted = true;
    video.playsInline = true;

    reel.appendChild(video);
    container.appendChild(reel);
});

// Auto play visible video
const reels = document.querySelectorAll("video");

function playVisibleVideo() {
    reels.forEach(video => video.pause());

    const middle = window.innerHeight / 2;

    reels.forEach(video => {
        const rect = video.getBoundingClientRect();
        if (rect.top < middle && rect.bottom > middle) {
            video.play();
        }
    });
}

// Scroll event
container.addEventListener("scroll", playVisibleVideo);

// Play first video
window.onload = playVisibleVideo;
</script>

</body>
</html>
